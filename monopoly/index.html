<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Spark Monopoly</title>

    <link rel="stylesheet" href="css/tokens.css?v=ui3">
    <link rel="stylesheet" href="css/monopoly.css?v=ui3">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Debug console inside the game iframe. The parent app appends
        // &debug=1 to the iframe URL for the developer, so resume/engine
        // logs are visible here too.
        (function () {
            try {
                if (location.search.indexOf('debug=1') === -1) return;
            } catch (e) { return; }
            var s = document.createElement('script');
            s.src = 'https://cdn.jsdelivr.net/npm/eruda';
            s.onload = function () { try { eruda.init(); console.log('[eruda] game console ready'); } catch (e) {} };
            document.head.appendChild(s);
        })();
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/schteppe/cannon.js/build/cannon.min.js"></script>
</head>
<body data-theme="dark">



    <!-- The whole board, sized as a square fitted to the viewport -->
    <div class="board-wrap">
        <div class="board" id="board">
            <!-- 40 tiles will be injected here by board-ui.js -->

            <!-- Center area: holds 3D dice canvas + UI -->
            <div class="board-center">
                <div class="dice-canvas-container" id="dice-canvas-container">
                    <!-- Three.js canvas will be appended here -->
                </div>

                <!-- Dice result readout -->
                <div class="dice-result" id="diceResult" aria-live="polite">
                    <div class="dice-result-die" id="dieA">—</div>
                    <div class="dice-result-plus">+</div>
                    <div class="dice-result-die" id="dieB">—</div>
                    <div class="dice-result-eq">=</div>
                    <div class="dice-result-sum" id="dieSum">—</div>
                </div>

                <!-- Large S logo by default; replaced by dice when rolled -->
                <div class="center-brand" id="centerBrand">
                    <div class="brand-s">S</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Property detail modal -->
    <div class="modal-backdrop" id="propModalBackdrop"></div>
    <div class="prop-modal" id="propModal" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="prop-modal-content" id="propModalContent">
            <!-- filled by JS -->
        </div>
    </div>



    <!-- Bottom dock -->
    <div class="bottom-dock">
        <div class="swipe-hint" id="swipeHint">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 19V5M5 12l7-7 7 7"/>
            </svg>
            <span>Свайп вверх для броска</span>
        </div>

        <div class="action-dock">
            <!-- Left action buttons -->
            <button class="dock-btn" id="dockMyCardsBtn" title="Мои карточки">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="6" width="14" height="14" rx="2"/>
                    <path d="M7 2h14v14"/>
                </svg>
                <span class="dock-btn-label">Карточки</span>
            </button>

            <button class="dock-btn" id="dockTradeBtn" title="Обмен">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 7h14l-3-3M21 7l-3 3M17 17H3l3 3M3 17l3-3"/>
                </svg>
                <span class="dock-btn-label">Обмен</span>
            </button>

            <!-- Central dice button -->
            <button class="dice-btn" id="rollBtn" aria-label="Бросить кубики">
                <svg width="44" height="44" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="2" fill="none"/>
                    <circle cx="8" cy="8" r="1.5"/>
                    <circle cx="16" cy="8" r="1.5"/>
                    <circle cx="12" cy="12" r="1.5"/>
                    <circle cx="8" cy="16" r="1.5"/>
                    <circle cx="16" cy="16" r="1.5"/>
                </svg>
                <span class="dice-btn-shine"></span>
            </button>

            <button class="dock-btn" id="dockMortgageBtn" title="Залог">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="6" width="18" height="13" rx="2"/>
                    <path d="M3 10h18M8 15h3"/>
                </svg>
                <span class="dock-btn-label">Залог</span>
            </button>

            <button class="dock-btn" id="dockMenuBtn" title="Меню">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="9"/>
                    <path d="M12 8v4l3 2"/>
                </svg>
                <span class="dock-btn-label">Меню</span>
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/board-data.js?v=ui3"></script>
    <script src="js/board-ui.js?v=ui3"></script>
    <script src="js/property-modal.js?v=ui3"></script>
    <script src="js/players.js?v=ui3"></script>
    <script src="js/game-state.js?v=ui3"></script>
    <script src="js/money-toast.js?v=ui3"></script>
    <script src="js/action-modal.js?v=ui3"></script>
    <script src="js/auction.js?v=ui3"></script>
    <script src="js/cards.js?v=ui3"></script>
    <script src="js/card-modal.js?v=ui3"></script>
    <script src="js/bankruptcy-modal.js?v=ui3"></script>
    <script src="js/jail-modal.js?v=ui3"></script>
    <script src="js/build-modal.js?v=ui3"></script>
    <script src="js/sell-assets-modal.js?v=ui3"></script>
    <script src="js/mortgage-modal.js?v=ui3"></script>
    <script src="js/trade-modal.js?v=ui3"></script>
    <script src="js/game-over-modal.js?v=ui3"></script>
    <script src="js/notice-modal.js?v=ui3"></script>
    <script src="js/menu-modal.js?v=ui3"></script>
    <script src="js/player-hud.js?v=ui3"></script>
    <script src="js/scene/SceneManager.js?v=ui3"></script>
    <script src="js/scene/Dice.js?v=ui3"></script>
    <script src="js/setup-screen.js?v=ui3"></script>
    <script src="js/online.js?v=ui3"></script>
    <script src="js/turn-timer.js?v=ui3"></script>
    <script src="js/main.js?v=ui3"></script>
</body>
</html>
